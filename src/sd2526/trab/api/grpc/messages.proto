syntax = "proto3";

package sd2526.trab.api.grpc;

import "google/protobuf/empty.proto";

option java_package = "sd2526.trab.api.grpc";

service GrpcMessages {
	rpc PostMessage(PostMessageArgs) returns (PostMessageResult);
	rpc GetInboxMessage(GetInboxMessageArgs) returns (GrpcMessage);
	rpc GetAllInboxMessages(GetAllInboxMessagesArgs) returns (GetAllInboxMessagesResult);
	rpc RemoveInboxMessage(RemoveInboxMessageArgs) returns (google.protobuf.Empty);
	rpc DeleteMessage(DeleteMessageArgs) returns (google.protobuf.Empty);
	rpc SearchInbox(SearchInboxArgs) returns (SearchInboxResult);
}

message GrpcMessage {
	string id = 1;
	string sender = 2;
	repeated string destination = 3;
	int64 creationTime = 4;
	string subject = 5;
	string contents = 6;
}

message PostMessageArgs {
	string pwd = 1;
	GrpcMessage message = 2;
}

message PostMessageResult {
	string mid = 1;
}

message GetInboxMessageArgs {
	string name = 1;
	string mid = 2;
	string pwd = 3;
}

message GetAllInboxMessagesArgs {
	string name = 1;
	string pwd = 2;
}

message GetAllInboxMessagesResult {
	repeated string mids = 1;
}

message RemoveInboxMessageArgs {
	string name = 1;
	string mid = 2;
	string pwd = 3;
}

message DeleteMessageArgs {
	string name = 1;
	string mid = 2;
	string pwd = 3;
}

message SearchInboxArgs {
	string name = 1;
	string pwd = 2;
	string query = 3;
}

message SearchInboxResult {
	repeated string mids = 1;
}

